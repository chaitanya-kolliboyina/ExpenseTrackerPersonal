<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>

<style>
/* ── exact port of JSX FONT_STYLE ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2a2a3d;border-radius:2px}

input,select,textarea{outline:none;border:none;background:none}

/* ── exact port of styles.root ── */
body{
  background:#0d0d14;min-height:100vh;height:100vh;
  display:flex;flex-direction:column;
  font-family:'Plus Jakarta Sans',sans-serif;
  overflow:hidden;color:#e2e8f0;
  max-width:520px;margin:0 auto;
}

/* ── exact port of styles.header ── */
#header{
  background:#0d0d14;border-bottom:1px solid #1a1a2e;
  padding:12px 14px 10px;flex-shrink:0;z-index:10;
}
#header-title{color:#e2e8f0;font-size:18px;font-weight:800;letter-spacing:-0.5px}
#header-sub{color:#475569;font-size:10px;margin-top:1px}

/* ── exact port of styles.periodRow / periodBtn / periodBtnActive ── */

#period-row::-webkit-scrollbar{display:none}
.period-btn{

  padding:4px 10px;color:#64748b;font-size:11px;font-weight:600;

}
.period-btn.active{background:#6366f133;border-color:#6366f1;color:#818cf8}

/* ── exact port of styles.content ── */
#content{flex:1;overflow-y:auto;padding-bottom:4px}
.tab{display:none}.tab.active{display:block}
.tab-inner{padding:12px 14px 8px}

/* ── exact port of styles.nav / navBtn / navBtnActive ── */
#nav{display:flex;background:#0d0d14;border-top:1px solid #1a1a2e;flex-shrink:0}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:8px 4px;background:transparent;
  border:none;color:#475569;cursor:pointer;

}
.nav-btn .nav-icon{font-size:20px}

.nav-btn.active{color:#6366f1}

/* ── exact port of styles.toast ── */
#toast{

  background:#1e1e2e;border:1px solid #3a3a52;border-radius:20px;
  padding:8px 18px;color:#a5b4fc;font-size:13px;
  font-family:'Plus Jakarta Sans',sans-serif;
  z-index:99;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.56);
  opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── exact port of styles.totalCard ── */
.total-card{
  background:linear-gradient(135deg,#1e1b4b 0%,#16161f 100%);
  border:1px solid #312e81;border-radius:14px;
  padding:16px 18px;margin-bottom:10px;
}
.total-card-label{color:#94a3b8;font-size:12px;margin-bottom:4px}
.total-card-amount{color:#fff;font-size:32px;font-family:'JetBrains Mono',monospace;font-weight:700;letter-spacing:-1px}
.total-card-count{color:#64748b;font-size:11px;margin-top:4px}

/* ── exact port of styles.statsRow / statCard ── */
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.stat-card{
  background:#16161f;border:1px solid #252535;
  border-top:2px solid transparent;border-radius:12px;padding:10px 10px 8px;
}
.stat-card-label{color:#64748b;font-size:10px;margin-bottom:4px}
.stat-card-val{font-family:'JetBrains Mono',monospace;font-weight:700}
.stat-card-sub{color:#94a3b8;font-size:10px;margin-top:2px}

/* ── exact port of styles.card ── */
.card{background:#16161f;border:1px solid #252535;border-radius:14px;padding:14px;margin-bottom:10px}
.card-title{color:#94a3b8;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}

/* ── exact port of styles.legendGrid / legendItem ── */
.legend-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 8px;margin-top:8px}
.legend-item{display:flex;align-items:center;overflow:hidden}
.legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;flex-shrink:0}
.legend-name{color:#94a3b8;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.legend-val{margin-left:auto;color:#e2e8f0;font-size:11px;font-family:'JetBrains Mono',monospace;padding-left:4px}

/* ── exact port of styles.txRow / txRowDel ── */
.tx-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #1a1a2e}

.tx-row-del:last-child{border-bottom:none}

.tx-desc-main{color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── exact port of styles.amountWrap / amountInput ── */
.amount-wrap{display:flex;align-items:center;justify-content:center;padding:16px 0 14px;border-bottom:1px solid #1e1e2e;margin-bottom:14px}
.amount-sign{color:#94a3b8;font-size:26px;font-family:'JetBrains Mono',monospace;margin-right:4px}
#inp-amount{

/* ── exact port of styles.fieldLabel ── */

/* ── exact port of styles.textInput ── */
.text-input{

/* ── exact port of styles.catGrid / catChip ── */

}

/* ── exact port of styles.addBtn ── */

  background:linear-gradient(135deg,#4f46e5,#7c3aed);border:none;

/* ── exact port of styles.delBtn ── */

<script>
// ═══════════════════════════════════════════════════════
// CATEGORIES — exact copy from JSX
// ═══════════════════════════════════════════════════════
const CATS = {
  groceries:     {label:"Groceries",        icon:"🛒", color:"#4ade80", subs:["Fresh Produce","Dairy","Meat & Fish","Packaged Foods","Beverages","Other"]},
  food:          {label:"Food & Dining",     icon:"🍽️", color:"#fb923c", subs:["Restaurant","Delivery (Zomato/Swiggy)","Fast Food","Café","Other"]},
  fuel:          {label:"Fuel & Vehicle",    icon:"⛽", color:"#f97316", subs:["Petrol/Diesel","CNG / EV Charge","Maintenance","Insurance","Parking & Toll","Other"]},
  rent:          {label:"Rent",              icon:"🏠", color:"#c084fc", subs:["Home Rent","PG / Hostel","Office Rent","Other"]},
  utilities:     {label:"Utilities",         icon:"⚡", color:"#facc15", subs:["Electricity","Water","Internet","Mobile / DTH","Gas / LPG","Other"]},

  investments:   {label:"Investments",       icon:"📈", color:"#818cf8", subs:["Stocks / MF","RD","PPF / EPF","Gold","Crypto","NPS","Other"]},
  loans:         {label:"Loans & EMI",       icon:"💳", color:"#f43f5e", subs:["Home Loan","Car Loan","Personal Loan","Credit Card EMI","Education Loan","Other"]},
  appliances:    {label:"Home & Appliances", icon:"🏡", color:"#60a5fa", subs:["Kitchen Appliance","Furniture","Electronics","Maintenance & Repair","Cleaning","Other"]},
  personal:      {label:"Personal Care",     icon:"🪞", color:"#fb7185", subs:["Clothing","Haircut / Salon","Skincare","Gifts","Other"]},
  entertainment: {label:"Entertainment",     icon:"🎬", color:"#a78bfa", subs:["OTT Subscriptions","Movies / Events","Gaming","Books","Other"]},
  travel:        {label:"Travel",            icon:"✈️", color:"#38bdf8", subs:["Flights","Hotels","Cab / Auto / Metro","Train / Bus","Other"]},
  education:     {label:"Education",         icon:"📚", color:"#fbbf24", subs:["Courses / Classes","Books & Materials","School / College Fees","Other"]},
  business:      {label:"Business",          icon:"💼", color:"#94a3b8", subs:["Office Supplies","Software / Subscriptions","Marketing","Client Expenses","Other"]},
};

const KW = [
  [/zomato|swiggy|food delivery|dominos|pizza|burger/i,              "food","Delivery (Zomato/Swiggy)"],
  [/restaurant|cafe|café|dine|mess|dhaba/i,                          "food","Restaurant"],
  [/petrol|diesel|bpcl|hpcl|iocl|indian oil|hp fuel/i,              "fuel","Petrol/Diesel"],
  [/cng|ev charg|electric vehicle/i,                                 "fuel","CNG / EV Charge"],
  [/puncture|tyre|car wash|vehicle service|bike service/i,           "fuel","Maintenance"],
  [/bescom|msedcl|electricity|power bill|eb bill/i,                  "utilities","Electricity"],
  [/water bill|water tax/i,                                          "utilities","Water"],
  [/internet|broadband|jio fiber|airtel fiber|act broadband/i,       "utilities","Internet"],
  [/recharge|airtel|jio |vi |vodafone|bsnl|tata sky|dish tv/i,       "utilities","Mobile / DTH"],
  [/lpg|indane|hp gas|bharat gas/i,                                  "utilities","Gas / LPG"],
  [/dmart|bigbasket|zepto|blinkit|instamart|reliance fresh|vegetable|sabzi|fruits/i,"groceries","Fresh Produce"],
  [/milk|dairy|curd|paneer|butter|cheese/i,                         "groceries","Dairy"],
  [/chicken|mutton|fish|egg|meat|seafood/i,                         "groceries","Meat & Fish"],
  [/netflix|prime video|hotstar|spotify|youtube premium|disney|zee5/i,"entertainment","OTT Subscriptions"],
  [/movie|cinema|pvr|inox|ticket|concert|show|event/i,             "entertainment","Movies / Events"],
  [/gym|fitness|cult\.fit|crossfit|yoga/i,                          "health","Gym / Fitness"],
  [/doctor|hospital|clinic|pharmacy|medicine|medic|health check/i,  "health","Doctor / Hospital"],
  [/house rent|monthly rent|pg rent|hostel/i,                       "rent","PG / Hostel"],
  [/\brent\b/i,                                                     "rent","Home Rent"],
  [/credit card emi|emi\b/i,                                        "loans","Credit Card EMI"],
  [/home loan|housing loan/i,                                       "loans","Home Loan"],
  [/car loan|vehicle loan/i,                                        "loans","Car Loan"],
  [/personal loan/i,                                                "loans","Personal Loan"],
  [/sip|mutual fund|\bmf\b|groww|zerodha|kite|upstox|smallcase|\bstocks?\b|nifty|sensex/i,"investments","Stocks / MF"],
  [/\brd\b|recurring deposit/i,                                     "investments","RD"],
  [/ppf|epf|provident fund|nps|pension fund/i,                      "investments","PPF / EPF"],
  [/\bgold\b|digital gold|sovereign bond/i,                         "investments","Gold"],
  [/crypto|bitcoin|ethereum|binance|wazirx/i,                       "investments","Crypto"],
  [/\bfd\b|fixed deposit/i,                                         "savings","FD"],
  [/emergency fund/i,                                               "savings","Emergency Fund"],
  [/refrigerator|washing machine|\bac\b|air condition|microwave|oven/i,"appliances","Kitchen Appliance"],
  [/furniture|sofa|bed |table|chair|shelf|almirah/i,                "appliances","Furniture"],
  [/laptop|mobile phone|smartphone|earphone|headphone|gadget/i,     "appliances","Electronics"],
  [/amazon|flipkart|appliances/i,                                   "appliances","Electronics"],
  [/myntra|ajio|clothing|clothes|shirt|pants|shoes|fashion/i,       "personal","Clothing"],
  [/salon|haircut|barber|spa|massage/i,                             "personal","Haircut / Salon"],
  [/flight|airline|indigo|spicejet|air india/i,                     "travel","Flights"],
  [/hotel|oyo|booking\.com|airbnb/i,                                "travel","Hotels"],
  [/ola|uber|rapido|\bauto\b|\bcab\b|metro|bus pass/i,              "travel","Cab / Auto / Metro"],
  [/train ticket|irctc|\bbus\b/i,                                   "travel","Train / Bus"],
  [/udemy|coursera|course|coaching|tuition|school fee|college fee/i,"education","Courses / Classes"],
  [/aws|azure|gcp|hosting|domain|saas|software sub/i,              "business","Software / Subscriptions"],
  [/office|stationery|printing/i,                                   "business","Office Supplies"],
];

function detectCat(desc) {
  for (const [re,cat,sub] of KW) if (re.test(desc)) return {category:cat,subcategory:sub};
  return null;
}

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let expenses = JSON.parse(localStorage.getItem('xpns_v3')||'[]');
let period   = 'monthly';
let tab      = 'dashboard';

// form state
let fAmount='', fDesc='', fCategory='', fSubcategory='', fDate='', fNote='';
let detected=null, accepted=false;

// history state
let histSearch='', histCat='all';

// confirm delete
let confirmDelId=null, confirmDelTimer=null;

// chart instances
const CI = {};

function save() { localStorage.setItem('xpns_v3', JSON.stringify(expenses)); }

// ═══════════════════════════════════════════════════════
// FORMATTERS — exact from JSX
// ═══════════════════════════════════════════════════════
function fmt(n){
  if(n>=1e5) return '₹'+(n/1e5).toFixed(1)+'L';
  if(n>=1e3) return '₹'+(n/1e3).toFixed(1)+'K';
  return '₹'+Math.round(n).toLocaleString('en-IN');
}
function fmtFull(n){ return '₹'+n.toLocaleString('en-IN',{maximumFractionDigits:0}); }
function fmtDate(s){ return new Date(s).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'2-digit'}); }
function todayStr(){ return new Date().toISOString().split('T')[0]; }

// ═══════════════════════════════════════════════════════
// FILTER BY PERIOD — exact from JSX
// ═══════════════════════════════════════════════════════
function filterByPeriod(arr,p){
  const now=new Date();
  const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  return arr.filter(e=>{
    const d=new Date(e.date);
    if(p==='daily')      return d>=today;
    if(p==='weekly')     return d>=new Date(today.getTime()-6*864e5);
    if(p==='monthly')    return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    if(p==='quarterly')  return d>=new Date(today.getTime()-89*864e5);
    if(p==='halfyearly') return d>=new Date(today.getTime()-179*864e5);
    if(p==='annual')     return d.getFullYear()===now.getFullYear();
    return true;
  });
}

// ═══════════════════════════════════════════════════════
// CAT DATA — exact from JSX
// ═══════════════════════════════════════════════════════
function getCatData(arr){
  const m={};
  arr.forEach(e=>{m[e.category]=(m[e.category]||0)+e.amount;});
  return Object.entries(m)
    .map(([c,v])=>({name:CATS[c]?.label||c, value:v, color:CATS[c]?.color||'#888', cat:c}))
    .sort((a,b)=>b.value-a.value);
}

// ═══════════════════════════════════════════════════════
// TIME SERIES — exact from JSX
// ═══════════════════════════════════════════════════════
function buildTimeSeries(arr,p){
  const now=new Date();
  const map={};
  if(p==='daily'||p==='weekly'){
    const days=p==='daily'?1:7;
    for(let i=days-1;i>=0;i--){
      const d=new Date(now.getTime()-i*864e5);
      const k=d.toLocaleDateString('en-IN',{weekday:'short',day:'numeric'});
      map[k]=0;
    }
    arr.forEach(e=>{
      const d=new Date(e.date);
      const k=d.toLocaleDateString('en-IN',{weekday:'short',day:'numeric'});
      if(k in map) map[k]+=e.amount;
    });
  } else if(p==='monthly'){
    const dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
    for(let i=1;i<=dim;i++){
      const d=new Date(now.getFullYear(),now.getMonth(),i);
      const k=d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
      map[k]=0;
    }
    arr.forEach(e=>{
      const d=new Date(e.date);
      if(d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()){
        const k=d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
        if(k in map) map[k]+=e.amount;
      }
    });
  } else {
    const months=p==='quarterly'?3:p==='halfyearly'?6:12;
    for(let i=months-1;i>=0;i--){
      const d=new Date(now.getFullYear(),now.getMonth()-i,1);
      const k=d.toLocaleDateString('en-IN',{month:'short',year:'2-digit'});
      map[k]=0;
    }
    arr.forEach(e=>{
      const d=new Date(e.date);
      const k=d.toLocaleDateString('en-IN',{month:'short',year:'2-digit'});
      if(k in map) map[k]+=e.amount;
    });
  }
  return Object.entries(map).map(([label,value])=>({label,value}));
}

// DASHBOARD — exact JSX DashTab
// ═══════════════════════════════════════════════════════
function renderDashboard(){
  const filtered=filterByPeriod(expenses,period);
  const total=filtered.reduce((s,e)=>s+e.amount,0);
  const catData=getCatData(filtered);
  const ts=buildTimeSeries(filtered,period);
  const days={daily:1,weekly:7,monthly:30,quarterly:90,halfyearly:180,annual:365}[period]||30;
  const avgPerDay=filtered.length?total/days:0;
  const topCat=catData[0]||null;
  const periodLabel={daily:"Today",weekly:"Week",monthly:"Month",quarterly:"3 Mo",halfyearly:"6 Mo",annual:"Year"}[period]||period;
  const recent=filtered.slice(0,6);

  let html='';

  // total-card (exact JSX)
  html+=`<div class="total-card">
    <div class="total-card-label">Total — ${periodLabel}</div>
    <div class="total-card-amount">${fmtFull(total)}</div>
    <div class="total-card-count">${filtered.length} transaction${filtered.length!==1?'s':''}</div>
  </div>`;

  // stats row — StatCard: icon prop makes fontSize 22, no icon = 16
  // Avg/day: val=fmt(avgPerDay), icon="📅"(truthy→22px), color=#818cf8
  // Transactions: val=count, icon="🔢"(truthy→22px), color=#38bdf8
  // Top Category: val=icon emoji, no icon prop(→16px), sub=label, color=topCat.color
  html+=`<div class="stats-row">
    <div class="stat-card" style="border-top-color:#818cf8">
      <div class="stat-card-label">Avg / day</div>
      <div class="stat-card-val" style="color:#818cf8;font-size:22px">${fmt(avgPerDay)}</div>
    </div>
    <div class="stat-card" style="border-top-color:#38bdf8">
      <div class="stat-card-label">Transactions</div>
      <div class="stat-card-val" style="color:#38bdf8;font-size:22px">${filtered.length}</div>
    </div>
    <div class="stat-card" style="border-top-color:${topCat?topCat.color:'#888'}">
      <div class="stat-card-label">Top Category</div>
      <div class="stat-card-val" style="color:${topCat?topCat.color:'#888'};font-size:16px">${topCat?CATS[topCat.cat]?.icon:'—'}</div>
      <div class="stat-card-sub">${topCat?CATS[topCat.cat]?.label:'None'}</div>
    </div>
  </div>`;

  // Donut (only if catData.length > 0)
  if(catData.length>0){
    const legendHTML=catData.slice(0,8).map(e=>`
      <div class="legend-item">
        <span class="legend-dot" style="background:${e.color}"></span>
        <span class="legend-name">${e.name}</span>
        <span class="legend-val">${fmt(e.value)}</span>
      </div>`).join('');
    html+=`<div class="card">
      <div class="card-title">Spending by Category</div>
      <div class="chart-box" style="height:200px"><canvas id="chart-donut"></canvas></div>
      <div class="legend-grid">${legendHTML}</div>
    </div>`;
  }

  // Bar chart (only if timeSeries.length > 0)
  if(ts.length>0){
    html+=`<div class="card">
      <div class="card-title">Spending Over Time</div>
      <div class="chart-box" style="height:160px"><canvas id="chart-bar"></canvas></div>
    </div>`;
  }

  // Recent transactions (only if recent.length > 0)
  if(recent.length>0){
    const rowsHTML=recent.map(e=>`
      <div class="tx-row">
        <div class="tx-icon" style="width:34px;height:34px;border-radius:9px;background:${CATS[e.category]?.color||'#888'}22;font-size:15px">${CATS[e.category]?.icon||'💸'}</div>
        <div style="flex:1;overflow:hidden">
          <div class="tx-desc-main" style="font-size:12px;font-weight:600">${e.description}</div>
          <div class="tx-meta" style="font-size:10px">${e.subcategory} · ${fmtDate(e.date)}</div>
        </div>
        <div style="color:${CATS[e.category]?.color||'#e2e8f0'};font-size:13px;font-family:'JetBrains Mono',monospace;font-weight:700;flex-shrink:0">₹${e.amount.toLocaleString('en-IN')}</div>
      </div>`).join('');
    html+=`<div class="card"><div class="card-title">Recent Transactions</div>${rowsHTML}</div>`;
  }

  // empty state
  if(filtered.length===0){
    html+=`<div class="empty"><div class="empty-icon">🧾</div>No expenses yet for this period.<br/>Tap <b style="color:#6366f1">Add</b> to record one.</div>`;
  }

  document.getElementById('dash-inner').innerHTML=html;

  // Now draw charts
  if(catData.length>0){
    destroyChart('donut');
    CI['donut']=new Chart(document.getElementById('chart-donut').getContext('2d'),{
      type:'doughnut',
      data:{
        labels:catData.map(c=>c.name),
        datasets:[{
          data:catData.map(c=>c.value),
          backgroundColor:catData.map(c=>c.color),
          borderColor:'#0d0d14',
          borderWidth:3,
          hoverBorderWidth:3
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        // innerRadius=55, outerRadius=85 → cutout = 55/85 ≈ 64.7%
        cutout:'64%',
        plugins:{
          legend:{display:false},
          tooltip:{...tooltipCfg,callbacks:{label:ctx=>` ${fmtFull(ctx.raw)}`}}
        }
      }
    });
  }

  if(ts.length>0){
    destroyChart('bar');
    // exact JSX: hsl(${250 + i*8}, 70%, ${55+i*2}%)
    const barColors=ts.map((_,i)=>`hsl(${250+i*8},70%,${55+i*2}%)`);
    CI['bar']=new Chart(document.getElementById('chart-bar').getContext('2d'),{
      type:'bar',
      data:{
        labels:ts.map(t=>t.label),
        datasets:[{
          data:ts.map(t=>t.value),
          backgroundColor:barColors,
          // exact JSX: radius={[4,4,0,0]} = top-left,top-right,bot-right,bot-left
          borderRadius:{topLeft:4,topRight:4,bottomLeft:0,bottomRight:0},
          borderSkipped:false,
          barThickness:14  // exact JSX: barSize=14
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{
          legend:{display:false},
          tooltip:{...tooltipCfg,callbacks:{label:ctx=>` ${fmtFull(ctx.raw)}`}}
        },
        scales:{
          x:{
            grid:{display:false},
            border:{display:false},
            ticks:{font:{size:9,family:"'Plus Jakarta Sans',sans-serif"},color:'#64748b',maxTicksLimit:8}
          },
          y:{
            grid:{color:'#1e1e2e',drawBorder:false},
            border:{display:false},
            ticks:{font:{size:9,family:"'JetBrains Mono',monospace"},color:'#64748b',callback:v=>fmt(v)}
          }
        }
      }
    });
  }
}

// ADD TAB — exact JSX AddTab
// ═══════════════════════════════════════════════════════
function renderAdd(){
  const subs=fCategory?CATS[fCategory]?.subs||[]:[];
  const detectVisible=detected&&!accepted;

  let detectHTML='';
  if(detectVisible){
    detectHTML=`<div class="detect-chip" id="detect-chip">
      <span>Detected: <b style="color:${CATS[detected.category]?.color}">${CATS[detected.category]?.label}</b> › ${detected.subcategory}</span>
      <button class="detect-btn" onclick="doAcceptDetect()">Accept ✓</button>
    </div>`;
  }

  const catGridHTML=Object.entries(CATS).map(([k,v])=>{
    const sel=fCategory===k;
    const selStyle=sel?`background:${v.color}22;border-color:${v.color};color:${v.color}`:'';
    return `<button class="cat-chip" data-cat="${k}" style="${selStyle}" onclick="doSelectCat('${k}')">
      <span class="cat-emoji">${v.icon}</span>
      <span class="cat-label">${v.label.split(' ')[0]}</span>
    </button>`;
  }).join('');

  let subHTML='';
  if(subs.length>0){
    const chips=subs.map(s=>{
      const sel=fSubcategory===s;
      const selStyle=sel?'background:#6366f122;border-color:#6366f1;color:#818cf8':'';
      return `<button class="sub-chip" style="${selStyle}" onclick="doSelectSub('${s}')">${s}</button>`;
    }).join('');
    subHTML=`<label class="field-label" style="margin-top:14px">Subcategory</label>
    <div style="display:flex;gap:6px;flex-wrap:wrap">${chips}</div>`;
  }

  document.getElementById('add-inner').innerHTML=`
    <div class="card">
      <div class="amount-wrap">
        <span class="amount-sign">₹</span>
        <input type="number" inputmode="decimal" id="inp-amount" placeholder="0.00" value="${fAmount}"/>
      </div>
      <label class="field-label">Description (auto-detects category)</label>
      <input type="text" class="text-input" id="inp-desc" placeholder="e.g. Zomato, Petrol, Netflix…" value="${fDesc}" autocomplete="off"/>
      ${detectHTML}
      <label class="field-label" style="margin-top:14px">Category</label>
      <div class="cat-grid">${catGridHTML}</div>
      ${subHTML}
      <label class="field-label" style="margin-top:14px">Date</label>
      <input type="date" class="text-input" id="inp-date" value="${fDate||todayStr()}"/>
      <label class="field-label" style="margin-top:14px">Note (optional)</label>
      <input type="text" class="text-input" id="inp-note" placeholder="Add a note…" value="${fNote}"/>
      <button class="add-btn" onclick="doAddExpense()">Add Expense</button>
    </div>`;

  // live listeners
  document.getElementById('inp-amount').addEventListener('input',e=>{ fAmount=e.target.value; });
  document.getElementById('inp-date').addEventListener('change',e=>{ fDate=e.target.value; });
  document.getElementById('inp-note').addEventListener('input',e=>{ fNote=e.target.value; });
  document.getElementById('inp-desc').addEventListener('input',e=>{
    fDesc=e.target.value;
    if(fDesc.length>2){
      const d=detectCat(fDesc);
      if(d&&!accepted){
        detected=d;
        fCategory=d.category;
        fSubcategory=d.subcategory;
      } else if(!d){ detected=null; }
    } else { detected=null; }
    renderAdd();
    // restore cursor
    const el=document.getElementById('inp-desc');
    if(el){ el.focus(); const len=el.value.length; el.setSelectionRange(len,len); }
  });
}

function doAcceptDetect(){
  if(!detected) return;
  fCategory=detected.category;
  fSubcategory=detected.subcategory;
  accepted=true;
  detected=null;
  renderAdd();
}

function doSelectCat(cat){
  fCategory=cat;
  fSubcategory=CATS[cat].subs[0];
  accepted=true;
  detected=null;
  renderAdd();
}

function doSelectSub(sub){
  fSubcategory=sub;
  renderAdd();
}

function doAddExpense(){
  const amt=parseFloat(document.getElementById('inp-amount')?.value||fAmount);
  const desc=(document.getElementById('inp-desc')?.value||fDesc).trim();
  const dt=document.getElementById('inp-date')?.value||fDate||todayStr();
  const note=(document.getElementById('inp-note')?.value||fNote).trim();
  if(!amt||isNaN(amt)||amt<=0) return showToast('Enter a valid amount');
  if(!fCategory) return showToast('Select a category');
  expenses.unshift({
    id:Date.now().toString(),
    amount:amt,
    description:desc||fSubcategory,
    category:fCategory,
    subcategory:fSubcategory,
    date:dt,
    note
  });
  save();
  // reset form state
  fAmount=''; fDesc=''; fCategory=''; fSubcategory=''; fDate=''; fNote='';
  detected=null; accepted=false;
  showToast('✓ Expense added');
  switchTab('dashboard');
}

// HISTORY — exact JSX HistTab
// ═══════════════════════════════════════════════════════
function renderHistory(){
  // search input
  let html=`<input type="text" class="text-input" id="hist-search" placeholder="🔍  Search transactions…" value="${histSearch}" style="margin-bottom:10px"/>`;

  // category filter — exact JSX sub-chip style
  const allStyle=histCat==='all'?'background:#6366f122;border-color:#6366f1;color:#818cf8':'';
  let filterHTML=`<button class="sub-chip" style="${allStyle}" onclick="setHistCat('all')">All</button>`;
  Object.entries(CATS).forEach(([k,v])=>{
    const sel=histCat===k;
    const selStyle=sel?`background:${v.color}22;border-color:${v.color};color:${v.color}`:'';
    filterHTML+=`<button class="sub-chip" style="${selStyle}" onclick="setHistCat('${k}')">${v.icon} ${v.label.split(' ')[0]}</button>`;
  });
  html+=`<div class="filter-scroll">${filterHTML}</div>`;

  // filtered list
  let arr=[...expenses].sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(histCat!=='all') arr=arr.filter(e=>e.category===histCat);
  if(histSearch) arr=arr.filter(e=>
    e.description.toLowerCase().includes(histSearch.toLowerCase())||
    (CATS[e.category]?.label||'').toLowerCase().includes(histSearch.toLowerCase())
  );

  if(arr.length===0){
    html+=`<div style="text-align:center;color:#64748b;padding:40px 20px;font-size:14px">No transactions found.</div>`;
  } else {
    // exact JSX: txRowDel — width:36,height:36,borderRadius:10, desc fontSize:13 fontWeight:600, meta fontSize:11, amt fontSize:14
    const rows=arr.map(e=>`
      <div class="tx-row-del" id="txr-${e.id}">
        <div class="tx-icon" style="width:36px;height:36px;border-radius:10px;background:${CATS[e.category]?.color||'#888'}22;font-size:16px;flex-shrink:0">${CATS[e.category]?.icon||'💸'}</div>
        <div style="flex:1;overflow:hidden">
          <div style="color:#e2e8f0;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.description}</div>
          <div style="color:#64748b;font-size:11px">${CATS[e.category]?.label||e.category} · ${e.subcategory} · ${fmtDate(e.date)}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="color:#e2e8f0;font-size:14px;font-family:'JetBrains Mono',monospace;font-weight:700">₹${e.amount.toLocaleString('en-IN')}</div>
          <button class="del-btn${confirmDelId===e.id?' confirm':''}" onclick="handleDel('${e.id}')">${confirmDelId===e.id?'Confirm?':'Delete'}</button>
        </div>
      </div>`).join('');
    html+=`<div class="card"><div style="color:#64748b;font-size:11px;margin-bottom:8px">${arr.length} records</div>${rows}</div>`;
  }

  document.getElementById('hist-inner').innerHTML=html;

  // search listener (re-render on input)
  document.getElementById('hist-search').addEventListener('input',e=>{
    histSearch=e.target.value;
    renderHistory();
    const el=document.getElementById('hist-search');
    if(el){el.focus();const l=el.value.length;el.setSelectionRange(l,l);}
  });
}

function setHistCat(cat){ histCat=cat; renderHistory(); }

function handleDel(id){
  if(confirmDelId===id){
    expenses=expenses.filter(e=>e.id!==id);
    save();
    confirmDelId=null;
    clearTimeout(confirmDelTimer);
    showToast('Deleted');
    renderHistory();
  } else {
    if(confirmDelId){
      const prev=document.querySelector(`#txr-${confirmDelId} .del-btn`);
      if(prev){prev.textContent='Delete';prev.classList.remove('confirm');}
    }
    confirmDelId=id;
    const btn=document.querySelector(`#txr-${id} .del-btn`);
    if(btn){btn.textContent='Confirm?';btn.classList.add('confirm');}
    clearTimeout(confirmDelTimer);
    confirmDelTimer=setTimeout(()=>{
      confirmDelId=null;
      const b=document.querySelector(`#txr-${id} .del-btn`);
      if(b){b.textContent='Delete';b.classList.remove('confirm');}
    },2500);
  }
}

// ═══════════════════════════════════════════════════════
// INSIGHTS — exact JSX InsightsTab
// ═══════════════════════════════════════════════════════
function renderInsights(){
  const filtered=filterByPeriod(expenses,period);
  const catData=getCatData(filtered);
  const topCat=catData[0]||null;

  // subData — exact JSX
  let subData=[];
  if(topCat){
    const m={};
    filtered.filter(e=>e.category===topCat.cat).forEach(e=>{m[e.subcategory]=(m[e.subcategory]||0)+e.amount;});
    subData=Object.entries(m).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value);
  }

  // monthlyTrend — exact JSX (always all expenses, last 6 months)
  const now=new Date();
  const trendLabels=[],trendValues=[];
  for(let i=5;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    trendLabels.push(d.toLocaleDateString('en-IN',{month:'short',year:'2-digit'}));
    trendValues.push(0);
  }
  expenses.forEach(e=>{
    const d=new Date(e.date);
    const k=d.toLocaleDateString('en-IN',{month:'short',year:'2-digit'});
    const idx=trendLabels.indexOf(k);
    if(idx>=0) trendValues[idx]+=e.amount;
  });

  const allTotal=expenses.reduce((s,e)=>s+e.amount,0);

  // Build HTML
  let html='';

  // 6-month trend card
  html+=`<div class="card">
    <div class="card-title">6-Month Spending Trend</div>
    <div class="chart-box" style="height:170px"><canvas id="chart-trend"></canvas></div>
  </div>`;

  // Top categories bar — exact JSX: height=Math.max(140, catData.length*34), title="Top Categories (Month)"
  if(catData.length>0){
    const hh=Math.max(140,catData.length*34);
    html+=`<div class="card">
      <div class="card-title">Top Categories (Month)</div>
      <div class="chart-box" style="height:${hh}px"><canvas id="chart-hbar"></canvas></div>
    </div>`;
  }

  // Subcategory breakdown — exact JSX
  if(topCat&&subData.length>0){
    const subBars=subData.map(s=>`
      <div class="sub-bar-row">
        <div class="sub-bar-row-head">
          <span class="sub-bar-name">${s.name}</span>
          <span class="sub-bar-val">${fmtFull(s.value)}</span>
        </div>
        <div class="sub-bar-track">
          <div class="sub-bar-fill" style="width:${(s.value/subData[0].value)*100}%;background:${topCat.color}"></div>
        </div>
      </div>`).join('');
    html+=`<div class="card">
      <div class="card-title">${CATS[topCat.cat]?.icon||''} ${CATS[topCat.cat]?.label||topCat.cat} — Subcategories</div>
      ${subBars}
    </div>`;
  }

  // Summary — exact JSX
  html+=`<div class="card">
    <div class="card-title">Summary (All Time)</div>
    <div class="sum-row"><span class="sum-label">Total Expenses</span><span class="sum-val">${fmtFull(allTotal)}</span></div>
    <div class="sum-row"><span class="sum-label">Total Transactions</span><span class="sum-val">${expenses.length}</span></div>
    <div class="sum-row"><span class="sum-label">Avg per transaction</span><span class="sum-val">${expenses.length?fmtFull(allTotal/expenses.length):'—'}</span></div>
    <div class="sum-row"><span class="sum-label">Categories used</span><span class="sum-val">${[...new Set(expenses.map(e=>e.category))].length}</span></div>
  </div>`;

  document.getElementById('ins-inner').innerHTML=html;

  // Area chart (trend) — exact JSX: stroke=#6366f1, strokeWidth=2, fill gradient, dot r=3
  destroyChart('trend');
  const ctxT=document.getElementById('chart-trend').getContext('2d');
  const grad=ctxT.createLinearGradient(0,0,0,170);
  grad.addColorStop(0,'rgba(99,102,241,0.4)');   // stopOpacity=0.4 at 5%
  grad.addColorStop(1,'rgba(99,102,241,0)');      // stopOpacity=0 at 95%
  CI['trend']=new Chart(ctxT,{
    type:'line',
    data:{
      labels:trendLabels,
      datasets:[{
        data:trendValues,
        borderColor:'#6366f1',
        borderWidth:2,
        backgroundColor:grad,
        fill:true,
        tension:0.4,  // monotone approximation
        pointBackgroundColor:'#6366f1',
        pointBorderColor:'#0d0d14',
        pointBorderWidth:2,
        pointRadius:3
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{...tooltipCfg,callbacks:{label:ctx=>` ${fmtFull(ctx.raw)}`}}
      },
      scales:{
        x:{
          grid:{display:false},border:{display:false},
          ticks:{font:{size:10,family:"'Plus Jakarta Sans',sans-serif"},color:'#64748b'}
        },
        y:{
          grid:{color:'#1e1e2e',drawBorder:false},border:{display:false},
          ticks:{font:{size:9,family:"'JetBrains Mono',monospace"},color:'#64748b',callback:v=>fmt(v)}
        }
      }
    }
  });

  // Horizontal bar — exact JSX: layout="vertical", barSize=14, radius=[0,4,4,0]
  if(catData.length>0){
    destroyChart('hbar');
    CI['hbar']=new Chart(document.getElementById('chart-hbar').getContext('2d'),{
      type:'bar',
      data:{
        labels:catData.map(c=>c.name),
        datasets:[{
          data:catData.map(c=>c.value),
          backgroundColor:catData.map(c=>c.color),
          // exact JSX: radius=[0,4,4,0] → right corners rounded
          borderRadius:{topLeft:0,topRight:4,bottomLeft:0,bottomRight:4},
          borderSkipped:false,
          barThickness:14
        }]
      },
      options:{
        indexAxis:'y',
        responsive:true,maintainAspectRatio:false,
        plugins:{
          legend:{display:false},
          tooltip:{...tooltipCfg,callbacks:{label:ctx=>` ${fmtFull(ctx.raw)}`}}
        },
        scales:{
          x:{
            grid:{color:'#1e1e2e',drawBorder:false},border:{display:false},
            ticks:{font:{size:9,family:"'JetBrains Mono',monospace"},color:'#64748b',callback:v=>fmt(v)}
          },
          y:{
            grid:{display:false},border:{display:false},
            ticks:{font:{size:10,family:"'Plus Jakarta Sans',sans-serif"},color:'#94a3b8'}
          }
        }
      }
    });
  }
}

// ═══════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ═══════════════════════════════════════════════════════
renderDashboard();
renderAdd();
</script>
